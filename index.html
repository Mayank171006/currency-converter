<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Currency Converter</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
        <div class="title">Currency Converter</div>
        <div class="mainBox">
                <form class="mainForm">
                        <div class="enter">
                                <p>Enter Amount</p>
                                <input name="Amount" type="text" value="1">
                        </div>
                        <div class="countrySelector">
                                <div class="countryBox" id="fromBox">
                                        <p>From</p>
                                        <div class="selectContainer">
                                                <img src="https://flagsapi.com/US/shiny/64.png">
                                                <select name="from"></select>
                                        </div>
                                </div>
                                <i class="fa-solid fa-arrow-right-arrow-left"></i>
                                <div class="countryBox" id="toBox">
                                        <p>To</p>
                                        <div class="selectContainer">
                                                <img src="https://flagsapi.com/IN/shiny/64.png">
                                                <select name="to"></select>
                                        </div>
                                </div>
                        </div>
                        <div class="AnswerBox">
                                1 USD = 95.67 INR
                        </div>
                        <button class="Submit">
                                Convert Currency
                        </button>
                </form>
        </div>

        <script src="countryCodes.js"></script>
        <script src="script.js"></script>
        
</body>
</html>
